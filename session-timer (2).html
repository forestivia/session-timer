<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0c0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,200;9..144,300;9..144,400&family=Inter+Tight:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #f4efe6;
    color: #2a2520;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }
  .serif { font-family: 'Fraunces', serif; font-weight: 300; letter-spacing: -0.01em; }
  .tnum { font-variant-numeric: tabular-nums; }

  .screen {
    flex: 1;
    display: none;
    flex-direction: column;
    width: 100%;
  }
  .screen.active { display: flex; }

  /* ---------- setup ---------- */
  #setup-screen {
    padding: calc(env(safe-area-inset-top) + 28px) 24px calc(env(safe-area-inset-bottom) + 28px);
    max-width: 480px;
    margin: 0 auto;
  }
  .header { text-align: center; margin-top: 8px; margin-bottom: 32px; }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 36px;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .header p { font-size: 13px; color: #7a6f64; letter-spacing: 0.02em; }

  .card-light {
    background: #faf6ed;
    border-radius: 18px;
    padding: 20px 22px;
    margin-bottom: 14px;
    border: 0.5px solid rgba(42, 37, 32, 0.08);
  }

  .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #9a8f82;
    margin-bottom: 14px;
  }

  /* duration input */
  .dur-input-wrap {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .dur-input {
    width: 140px;
    background: transparent;
    border: none;
    border-bottom: 0.5px solid rgba(42, 37, 32, 0.2);
    text-align: center;
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 56px;
    line-height: 1;
    color: #2a2520;
    padding: 4px 0 8px;
    outline: none;
    -moz-appearance: textfield;
  }
  .dur-input:focus { border-bottom-color: #2a2520; }
  .dur-input::-webkit-outer-spin-button,
  .dur-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .dur-unit { font-size: 14px; color: #7a6f64; letter-spacing: 0.02em; }

  .preset-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .preset {
    background: transparent;
    border: 0.5px solid rgba(42, 37, 32, 0.18);
    color: #2a2520;
    padding: 10px 0;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .preset:active { background: rgba(42, 37, 32, 0.06); }
  .preset.selected {
    background: #2a2520;
    color: #f4efe6;
    border-color: #2a2520;
  }

  /* ---------- cue list ---------- */
  .cues-card { padding: 18px 22px; }
  .cues-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .cues-count {
    font-size: 12px;
    color: #9a8f82;
    font-variant-numeric: tabular-nums;
  }
  .cue-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-top: 0.5px solid rgba(42, 37, 32, 0.08);
  }
  .cue-row:first-of-type { border-top: none; padding-top: 4px; }
  .cue-min-input {
    width: 56px;
    background: transparent;
    border: 0.5px solid rgba(42, 37, 32, 0.2);
    border-radius: 8px;
    text-align: center;
    font-family: inherit;
    font-size: 16px;
    color: #2a2520;
    padding: 8px 4px;
    outline: none;
    -moz-appearance: textfield;
  }
  .cue-min-input::-webkit-outer-spin-button,
  .cue-min-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .cue-min-input:focus { border-color: #2a2520; }
  .cue-min-label {
    font-size: 13px;
    color: #4a4036;
    flex: 1;
  }

  .pattern-picker {
    display: flex;
    gap: 4px;
    background: #f1ebe0;
    border-radius: 10px;
    padding: 3px;
  }
  .pat-btn {
    background: transparent;
    border: none;
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    color: #4a4036;
    transition: background 150ms ease;
  }
  .pat-btn.selected {
    background: #2a2520;
    color: #d9a86c;
  }
  .pat-btn svg { width: 18px; height: 18px; }

  .remove-cue {
    background: none;
    border: none;
    color: #b8a89a;
    font-size: 22px;
    line-height: 1;
    padding: 4px 6px;
    cursor: pointer;
    font-family: 'Fraunces', serif;
    font-weight: 300;
  }
  .remove-cue:active { color: #7a6f64; }

  .add-cue-btn {
    width: 100%;
    background: transparent;
    border: 0.5px dashed rgba(42, 37, 32, 0.25);
    color: #7a6f64;
    padding: 14px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    margin-top: 12px;
  }
  .add-cue-btn:active { background: rgba(42, 37, 32, 0.04); }
  .add-cue-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .cue-help {
    font-size: 12px;
    color: #9a8f82;
    margin-top: 10px;
    line-height: 1.5;
  }
  .cue-error {
    font-size: 12px;
    color: #a86848;
    margin-top: 8px;
    min-height: 16px;
  }

  /* brightness */
  .brightness-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .bright-opt {
    background: transparent;
    border: 0.5px solid rgba(42, 37, 32, 0.18);
    color: #2a2520;
    padding: 10px 0;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .bright-opt.selected { background: #2a2520; color: #f4efe6; border-color: #2a2520; }

  /* start */
  .start-btn {
    width: 100%;
    background: #2a2520;
    color: #f4efe6;
    border: none;
    padding: 20px;
    border-radius: 14px;
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 20px;
    cursor: pointer;
    margin-top: 18px;
    transition: transform 100ms ease;
  }
  .start-btn:active { transform: scale(0.985); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .test-link {
    background: none;
    border: none;
    color: #7a6f64;
    font-family: inherit;
    font-size: 13px;
    padding: 12px;
    width: 100%;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: rgba(122, 111, 100, 0.3);
    text-underline-offset: 4px;
  }

  /* ---------- timer screen ---------- */
  #timer-screen {
    background: #0e0c0a;
    color: #d4cdbf;
    position: relative;
    overflow: hidden;
  }
  #timer-screen.active { display: flex; }
  .timer-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: calc(env(safe-area-inset-top) + 28px) 28px calc(env(safe-area-inset-bottom) + 24px);
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  #timer-screen .dim-target { transition: opacity 1200ms ease; }
  #timer-screen.dimmed .dim-target { opacity: 0.18; }

  .phase {
    text-align: center;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: #6a6256;
    margin-bottom: 24px;
    min-height: 14px;
  }

  .ring-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
  .ring { width: 76vw; max-width: 300px; aspect-ratio: 1; position: relative; }
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { stroke: rgba(212, 205, 191, 0.06); }
  .ring-fg {
    stroke: #8a7a5c;
    stroke-linecap: round;
    transition: stroke-dashoffset 300ms linear;
  }
  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .time-main {
    font-family: 'Fraunces', serif;
    font-weight: 200;
    font-size: 58px;
    letter-spacing: -0.02em;
    line-height: 1;
    color: #d4cdbf;
  }
  .time-sub {
    font-size: 11px;
    color: #6a6256;
    letter-spacing: 0.1em;
    margin-top: 8px;
    text-transform: lowercase;
  }

  /* upcoming cues strip */
  .upcoming {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
    margin-bottom: 20px;
    min-height: 44px;
    flex-wrap: wrap;
  }
  .up-cue {
    text-align: center;
    padding: 8px 12px;
    border-radius: 10px;
    border: 0.5px solid rgba(212, 205, 191, 0.08);
    opacity: 0.5;
    transition: all 600ms ease;
    min-width: 60px;
  }
  .up-cue.fired { opacity: 1; border-color: rgba(217, 168, 108, 0.3); background: rgba(217, 168, 108, 0.04); }
  .up-cue-time {
    font-size: 13px;
    font-family: 'Fraunces', serif;
    font-weight: 300;
    color: #d4cdbf;
  }
  .up-cue-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6a6256;
    margin-top: 2px;
  }

  .controls { display: flex; gap: 10px; }
  .ctrl-btn {
    flex: 1;
    background: transparent;
    border: 0.5px solid rgba(212, 205, 191, 0.12);
    color: #d4cdbf;
    padding: 14px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
  }
  .ctrl-btn:active { background: rgba(212, 205, 191, 0.04); }

  /* ---------- cue overlay ---------- */
  .cue-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0 28px 18%;
    pointer-events: none;
    z-index: 10;
  }
  .cue {
    background: #1c1612;
    border: 0.5px solid rgba(217, 168, 108, 0.4);
    border-radius: 18px;
    padding: 28px 38px;
    text-align: center;
    transform: translateY(40px);
    opacity: 0;
    transition: transform 800ms cubic-bezier(0.22, 1, 0.36, 1), opacity 800ms ease;
    box-shadow: 0 0 40px rgba(217, 168, 108, 0.08);
    min-width: 220px;
  }
  .cue.show { transform: translateY(0); opacity: 1; }
  .cue-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: #8a7a5c;
    margin-bottom: 18px;
  }

  /* Pattern visuals */
  .pat-display {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
  }
  /* solid: single static dot */
  .pat-solid {
    width: 22px; height: 22px; border-radius: 50%;
    background: #d9a86c;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 400ms ease, transform 600ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .cue.show .pat-solid { opacity: 1; transform: scale(1); transition-delay: 200ms; }

  /* pulse: dot that pulses gently */
  .pat-pulse {
    width: 22px; height: 22px; border-radius: 50%;
    background: #d9a86c;
    opacity: 0;
  }
  .cue.show .pat-pulse {
    opacity: 1;
    animation: pulseAnim 1.4s ease-in-out infinite;
    animation-delay: 250ms;
  }
  @keyframes pulseAnim {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(217, 168, 108, 0.5); }
    50% { transform: scale(1.05); box-shadow: 0 0 0 14px rgba(217, 168, 108, 0); }
  }

  /* bar: horizontal bar */
  .pat-bar {
    width: 0;
    height: 6px;
    border-radius: 3px;
    background: #d9a86c;
    transition: width 700ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .cue.show .pat-bar { width: 120px; transition-delay: 200ms; }

  .cue-text {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 22px;
    color: #d4cdbf;
    letter-spacing: 0.01em;
  }
  .cue-sub {
    font-size: 11px;
    color: #8a7a5c;
    letter-spacing: 0.1em;
    margin-top: 6px;
    text-transform: lowercase;
  }

  /* ---------- done ---------- */
  #done-screen {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
  }
  .done-mark { font-family: 'Fraunces', serif; font-weight: 300; font-size: 80px; line-height: 1; color: #7a6f64; margin-bottom: 16px; }
  .done-h { font-family: 'Fraunces', serif; font-weight: 300; font-size: 32px; letter-spacing: -0.01em; margin-bottom: 10px; }
  .done-stats { font-size: 13px; color: #7a6f64; margin-bottom: 36px; }
  .done-btn {
    background: #2a2520; color: #f4efe6; border: none;
    padding: 16px 32px; border-radius: 12px;
    font-family: inherit; font-size: 14px; cursor: pointer;
  }
</style>
</head>
<body>

<!-- ========== SETUP ========== -->
<div id="setup-screen" class="screen active">
  <div class="header">
    <h1 class="serif">Session</h1>
    <p>a quiet timekeeper</p>
  </div>

  <!-- Length -->
  <div class="card-light">
    <div class="label">Length</div>
    <div class="dur-input-wrap">
      <input type="number" id="dur-input" class="dur-input tnum" value="50" min="1" max="240" inputmode="numeric">
      <span class="dur-unit">min</span>
    </div>
    <div class="preset-row">
      <button class="preset" data-val="30">30</button>
      <button class="preset" data-val="45">45</button>
      <button class="preset selected" data-val="50">50</button>
      <button class="preset" data-val="60">60</button>
    </div>
  </div>

  <!-- Cues -->
  <div class="card-light cues-card">
    <div class="cues-header">
      <span class="label" style="margin-bottom: 0;">Cues (time remaining)</span>
      <span class="cues-count" id="cues-count">0 of 3</span>
    </div>
    <div id="cue-list"></div>
    <button class="add-cue-btn" id="add-cue" onclick="addCue()">+ Add cue</button>
    <div class="cue-error" id="cue-error"></div>
    <div class="cue-help">
      Each cue fires when that many minutes are left. Pick a pattern: <strong style="font-weight:500">solid</strong> (calm), <strong style="font-weight:500">pulse</strong> (gentle attention), <strong style="font-weight:500">bar</strong> (final).
    </div>
  </div>

  <!-- Brightness -->
  <div class="card-light">
    <div class="label">Screen brightness</div>
    <div class="brightness-row">
      <button class="bright-opt" data-bright="dim">Very dim</button>
      <button class="bright-opt selected" data-bright="auto">Auto-dim</button>
      <button class="bright-opt" data-bright="normal">Normal</button>
    </div>
  </div>

  <button class="start-btn serif" onclick="startSession()">Begin</button>
  <button class="test-link" onclick="previewCue()">Preview cue</button>
</div>

<!-- ========== TIMER ========== -->
<div id="timer-screen" class="screen">
  <div class="timer-inner">
    <div class="phase dim-target" id="phase">in session</div>

    <div class="ring-wrap dim-target">
      <div class="ring">
        <svg viewBox="0 0 200 200">
          <circle class="ring-bg" cx="100" cy="100" r="92" fill="none" stroke-width="2"/>
          <circle class="ring-fg" id="ring-fg" cx="100" cy="100" r="92" fill="none" stroke-width="2"
                  stroke-dasharray="578.05" stroke-dashoffset="578.05"/>
        </svg>
        <div class="ring-center">
          <div class="time-main tnum" id="time-main">50:00</div>
          <div class="time-sub" id="time-sub">remaining</div>
        </div>
      </div>
    </div>

    <div class="upcoming dim-target" id="upcoming"></div>

    <div class="controls dim-target">
      <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">Pause</button>
      <button class="ctrl-btn" onclick="endSession()">End</button>
    </div>
  </div>

  <div class="cue-overlay">
    <div class="cue" id="cue">
      <div class="cue-label" id="cue-label">Cue</div>
      <div class="pat-display" id="pat-display"></div>
      <div class="cue-text" id="cue-text">10 min left</div>
      <div class="cue-sub" id="cue-sub">remaining</div>
    </div>
  </div>
</div>

<!-- ========== DONE ========== -->
<div id="done-screen" class="screen">
  <div class="done-mark serif">·</div>
  <div class="done-h serif">Complete</div>
  <div class="done-stats" id="done-stats"></div>
  <button class="done-btn" onclick="resetApp()">Begin another</button>
</div>

<script>
(function() {
  const STORE_KEY = 'sessionTimerConfig_v3';
  const MAX_CUES = 3;

  // SVG icons for pattern buttons (inline so always available)
  const PAT_ICONS = {
    solid: '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>',
    pulse: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4" fill="currentColor"/><circle cx="12" cy="12" r="9" opacity="0.5"/></svg>',
    bar: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="10" width="18" height="4" rx="2"/></svg>'
  };
  const PAT_NAMES = { solid: 'solid', pulse: 'pulse', bar: 'bar' };

  const state = {
    duration: 50,
    brightness: 'auto',
    cues: [
      { id: 1, minutesLeft: 10, pattern: 'pulse' }
    ],
    nextCueId: 2,
    startTime: null,
    pausedAt: null,
    totalPaused: 0,
    intervalId: null,
    activeCues: [], // sorted by fire time, with fired flag
    wakeLock: null,
    dimTimer: null,
    cueTimer: null
  };

  // ---- persistence ----
  function saveConfig() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({
        duration: state.duration,
        brightness: state.brightness,
        cues: state.cues
      }));
    } catch(e) {}
  }
  function loadConfig() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return;
      const cfg = JSON.parse(raw);
      if (cfg.duration) state.duration = cfg.duration;
      if (cfg.brightness) state.brightness = cfg.brightness;
      if (Array.isArray(cfg.cues) && cfg.cues.length) {
        state.cues = cfg.cues.slice(0, MAX_CUES).map((c, i) => ({
          id: i + 1,
          minutesLeft: c.minutesLeft,
          pattern: c.pattern || 'pulse'
        }));
        state.nextCueId = state.cues.length + 1;
      }
    } catch(e) {}
  }

  function vibrate(pattern) {
    if ('vibrate' in navigator) {
      try { navigator.vibrate(pattern); } catch(e) {}
    }
  }

  // ---- duration UI ----
  const durInput = document.getElementById('dur-input');
  durInput.addEventListener('input', () => {
    const v = parseInt(durInput.value);
    if (!isNaN(v) && v > 0) {
      state.duration = v;
      refreshPresets();
      validate();
      saveConfig();
    }
  });
  durInput.addEventListener('blur', () => {
    let v = parseInt(durInput.value);
    if (isNaN(v) || v < 1) v = 1;
    if (v > 240) v = 240;
    durInput.value = v;
    state.duration = v;
    refreshPresets();
    validate();
    saveConfig();
  });

  document.querySelectorAll('.preset').forEach(btn => {
    btn.addEventListener('click', () => {
      state.duration = parseInt(btn.dataset.val);
      durInput.value = state.duration;
      refreshPresets();
      validate();
      saveConfig();
    });
  });
  function refreshPresets() {
    document.querySelectorAll('.preset').forEach(b => {
      b.classList.toggle('selected', parseInt(b.dataset.val) === state.duration);
    });
  }

  // brightness
  document.querySelectorAll('.bright-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      state.brightness = btn.dataset.bright;
      document.querySelectorAll('.bright-opt').forEach(b => {
        b.classList.toggle('selected', b.dataset.bright === state.brightness);
      });
      saveConfig();
    });
  });

  // ---- cue list UI ----
  function renderCues() {
    const list = document.getElementById('cue-list');
    list.innerHTML = '';
    state.cues.forEach((cue) => {
      const row = document.createElement('div');
      row.className = 'cue-row';

      // minutes input
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.className = 'cue-min-input';
      inp.value = cue.minutesLeft;
      inp.min = 1;
      inp.max = 240;
      inp.inputMode = 'numeric';
      inp.addEventListener('input', () => {
        const v = parseInt(inp.value);
        if (!isNaN(v) && v > 0) {
          cue.minutesLeft = v;
          validate();
          saveConfig();
        }
      });
      inp.addEventListener('blur', () => {
        let v = parseInt(inp.value);
        if (isNaN(v) || v < 1) v = 1;
        inp.value = v;
        cue.minutesLeft = v;
        validate();
        saveConfig();
      });
      row.appendChild(inp);

      const lbl = document.createElement('div');
      lbl.className = 'cue-min-label';
      lbl.textContent = 'min remaining';
      row.appendChild(lbl);

      // pattern picker
      const picker = document.createElement('div');
      picker.className = 'pattern-picker';
      ['solid', 'pulse', 'bar'].forEach(p => {
        const b = document.createElement('button');
        b.className = 'pat-btn' + (cue.pattern === p ? ' selected' : '');
        b.innerHTML = PAT_ICONS[p];
        b.title = PAT_NAMES[p];
        b.setAttribute('aria-label', PAT_NAMES[p]);
        b.addEventListener('click', () => {
          cue.pattern = p;
          renderCues();
          saveConfig();
        });
        picker.appendChild(b);
      });
      row.appendChild(picker);

      // remove
      const rm = document.createElement('button');
      rm.className = 'remove-cue';
      rm.textContent = '×';
      rm.setAttribute('aria-label', 'Remove cue');
      rm.addEventListener('click', () => {
        state.cues = state.cues.filter(c => c.id !== cue.id);
        renderCues();
        validate();
        saveConfig();
      });
      row.appendChild(rm);

      list.appendChild(row);
    });

    document.getElementById('cues-count').textContent = state.cues.length + ' of ' + MAX_CUES;
    document.getElementById('add-cue').disabled = state.cues.length >= MAX_CUES;
  }

  window.addCue = function() {
    if (state.cues.length >= MAX_CUES) return;
    // smart default: pick a remaining-minutes value not used yet, biased to common ones
    const used = state.cues.map(c => c.minutesLeft);
    const defaults = [10, 5, 15, 20, 2, 1];
    let pick = defaults.find(d => !used.includes(d)) || 5;
    state.cues.push({
      id: state.nextCueId++,
      minutesLeft: pick,
      pattern: state.cues.length === 0 ? 'pulse' : (state.cues.length === 1 ? 'solid' : 'bar')
    });
    renderCues();
    validate();
    saveConfig();
  };

  function validate() {
    const err = document.getElementById('cue-error');
    const startBtn = document.querySelector('.start-btn');
    let msg = '';
    if (state.duration < 1) msg = 'Session length must be at least 1 minute.';
    for (const cue of state.cues) {
      if (cue.minutesLeft >= state.duration) {
        msg = 'Cue at ' + cue.minutesLeft + ' min remaining must be less than session length.';
        break;
      }
    }
    // check duplicates
    const mins = state.cues.map(c => c.minutesLeft);
    if (new Set(mins).size !== mins.length) {
      msg = msg || 'Two cues have the same time remaining.';
    }
    err.textContent = msg;
    startBtn.disabled = !!msg;
    return !msg;
  }

  window.previewCue = function() {
    const sample = state.cues[0] || { minutesLeft: 10, pattern: 'pulse' };
    showCue({ minutesLeft: sample.minutesLeft, pattern: sample.pattern }, true);
  };

  // ---- wake lock ----
  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try { state.wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
  }
  function releaseWakeLock() {
    if (state.wakeLock) {
      try { state.wakeLock.release(); } catch(e) {}
      state.wakeLock = null;
    }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && state.intervalId) requestWakeLock();
  });

  // ---- dimming ----
  function applyDimMode() {
    const screen = document.getElementById('timer-screen');
    screen.classList.remove('dimmed');
    clearTimeout(state.dimTimer);
    if (state.brightness === 'dim') {
      setTimeout(() => screen.classList.add('dimmed'), 100);
    } else if (state.brightness === 'auto') {
      state.dimTimer = setTimeout(() => screen.classList.add('dimmed'), 4000);
    }
  }
  function wakeBriefly() {
    if (state.brightness === 'normal') return;
    const screen = document.getElementById('timer-screen');
    screen.classList.remove('dimmed');
    clearTimeout(state.dimTimer);
    if (state.brightness === 'auto') {
      state.dimTimer = setTimeout(() => screen.classList.add('dimmed'), 4000);
    } else {
      state.dimTimer = setTimeout(() => screen.classList.add('dimmed'), 3000);
    }
  }
  document.getElementById('timer-screen').addEventListener('click', wakeBriefly);

  // ---- show cue overlay ----
  function showCue(cueData, isPreview) {
    const cue = document.getElementById('cue');
    const labelEl = document.getElementById('cue-label');
    const textEl = document.getElementById('cue-text');
    const subEl = document.getElementById('cue-sub');
    const patDisplay = document.getElementById('pat-display');

    labelEl.textContent = isPreview ? 'Preview' : 'Cue';

    const m = cueData.minutesLeft;
    if (m === 0) { textEl.textContent = 'time'; subEl.textContent = 'session ends'; }
    else if (m === 1) { textEl.textContent = '1 minute'; subEl.textContent = 'remaining'; }
    else { textEl.textContent = m + ' minutes'; subEl.textContent = 'remaining'; }

    // build the visual pattern
    patDisplay.innerHTML = '';
    const visual = document.createElement('div');
    if (cueData.pattern === 'solid') visual.className = 'pat-solid';
    else if (cueData.pattern === 'pulse') visual.className = 'pat-pulse';
    else if (cueData.pattern === 'bar') visual.className = 'pat-bar';
    patDisplay.appendChild(visual);

    // brighten for cue
    const screen = document.getElementById('timer-screen');
    const wasDimmed = screen.classList.contains('dimmed');
    if (wasDimmed) screen.classList.remove('dimmed');

    void cue.offsetWidth;
    cue.classList.add('show');

    // bonus vibration if device supports
    const vibPat = cueData.pattern === 'solid' ? [180]
                : cueData.pattern === 'pulse' ? [120, 100, 120]
                : [400];
    vibrate(vibPat);

    clearTimeout(state.cueTimer);
    state.cueTimer = setTimeout(() => {
      cue.classList.remove('show');
      setTimeout(() => {
        if (state.brightness === 'dim') screen.classList.add('dimmed');
        else if (state.brightness === 'auto') {
          clearTimeout(state.dimTimer);
          state.dimTimer = setTimeout(() => screen.classList.add('dimmed'), 2000);
        }
      }, 900);
    }, 3000);
  }

  // ---- upcoming cues strip ----
  function renderUpcoming() {
    const wrap = document.getElementById('upcoming');
    wrap.innerHTML = '';
    state.activeCues.forEach((c, i) => {
      const d = document.createElement('div');
      d.className = 'up-cue';
      d.id = 'up-cue-' + i;
      d.innerHTML = '<div class="up-cue-time tnum">' + c.minutesLeft + 'm</div><div class="up-cue-label">' + c.pattern + '</div>';
      wrap.appendChild(d);
    });
  }

  // ---- start session ----
  window.startSession = function() {
    if (!validate()) return;

    state.startTime = Date.now();
    state.totalPaused = 0;
    state.pausedAt = null;

    // Sort cues by fire-time (earliest fire = highest minutesLeft = soonest in session)
    state.activeCues = state.cues
      .map(c => ({ minutesLeft: c.minutesLeft, pattern: c.pattern, fired: false }))
      .sort((a, b) => b.minutesLeft - a.minutesLeft);

    renderUpcoming();

    document.getElementById('setup-screen').classList.remove('active');
    document.getElementById('timer-screen').classList.add('active');

    requestWakeLock();
    applyDimMode();

    tick();
    state.intervalId = setInterval(tick, 250);
  };

  function formatTime(ms) {
    const totalSec = Math.max(0, Math.ceil(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function setPhase(t) { document.getElementById('phase').textContent = t; }

  function tick() {
    if (state.pausedAt) return;
    const elapsedMs = Date.now() - state.startTime - state.totalPaused;
    const remainingMs = state.duration * 60000 - elapsedMs;
    const remainingMin = remainingMs / 60000;

    document.getElementById('time-main').textContent = formatTime(remainingMs);

    const circumference = 578.05;
    const progress = Math.min(1, elapsedMs / (state.duration * 60000));
    document.getElementById('ring-fg').setAttribute('stroke-dashoffset', circumference * (1 - progress));

    // Fire cues when remaining time drops to or below cue's minutesLeft
    state.activeCues.forEach((c, i) => {
      if (!c.fired && remainingMin <= c.minutesLeft) {
        c.fired = true;
        const upEl = document.getElementById('up-cue-' + i);
        if (upEl) upEl.classList.add('fired');
        showCue(c);
      }
    });

    // End
    if (remainingMs <= 0) {
      setPhase('time');
      document.getElementById('time-sub').textContent = 'session ended';
      // big end cue (always a bar)
      showCue({ minutesLeft: 0, pattern: 'bar' });
      clearInterval(state.intervalId);
      state.intervalId = null;
      setTimeout(endSession, 4000);
      return;
    }

    // Phase label based on remaining
    if (remainingMin > state.duration * 2 / 3) setPhase('opening');
    else if (remainingMin > state.duration / 3) setPhase('middle');
    else setPhase('closing');
  }

  window.togglePause = function() {
    const btn = document.getElementById('pause-btn');
    if (state.pausedAt) {
      state.totalPaused += Date.now() - state.pausedAt;
      state.pausedAt = null;
      btn.textContent = 'Pause';
    } else {
      state.pausedAt = Date.now();
      btn.textContent = 'Resume';
    }
    wakeBriefly();
  };

  window.endSession = function() {
    if (state.intervalId) { clearInterval(state.intervalId); state.intervalId = null; }
    clearTimeout(state.dimTimer);
    clearTimeout(state.cueTimer);
    releaseWakeLock();
    const elapsedMin = (Date.now() - state.startTime - state.totalPaused) / 60000;
    document.getElementById('timer-screen').classList.remove('active', 'dimmed');
    document.getElementById('cue').classList.remove('show');
    document.getElementById('done-screen').classList.add('active');
    document.getElementById('done-stats').textContent =
      Math.round(elapsedMin) + ' of ' + state.duration + ' minutes';
  };

  window.resetApp = function() {
    document.getElementById('done-screen').classList.remove('active');
    document.getElementById('setup-screen').classList.add('active');
    document.getElementById('time-sub').textContent = 'remaining';
    setPhase('in session');
    refreshPresets();
  };

  // --- init ---
  loadConfig();
  durInput.value = state.duration;
  refreshPresets();
  document.querySelectorAll('.bright-opt').forEach(b => {
    b.classList.toggle('selected', b.dataset.bright === state.brightness);
  });
  renderCues();
  validate();
})();
</script>
</body>
</html>
